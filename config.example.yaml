# oas-go-template example config.
#
# Copy to config.yaml and edit. Real config.yaml is gitignored so secrets stay
# out of the repo. Configuration is YAML-only; environment variables do not
# override these fields.

server:
  http_addr: ":8000"
  gin_mode: debug            # debug | release | test
  read_header_timeout: 5s
  read_timeout: 15s
  write_timeout: 30s         # set to 0 for streaming responses
  idle_timeout: 60s
  max_header_bytes: 1048576  # 1 MiB
  max_body_bytes: 1048576    # 1 MiB; 0 disables the application limit

db:
  driver: ""                 # postgres | mysql | sqlite; empty = disabled
  dsn: ""                    # required when driver is set
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m     # any time.ParseDuration form
  log_sql: false             # true = print every SQL statement (dev only)

log:
  format: text               # text | json
  level: info                # debug | info | warn | error

otel:
  enabled: true              # false = skip SDK init entirely
  exporter_otlp_endpoint: "http://localhost:4318"   # OTLP HTTP URL
  service_name: ""           # leave empty to use cmd/server's hardcoded serviceName
  service_version: ""        # leave empty to use ldflags-injected version.Version

cors:
  enabled: false              # keep disabled unless a browser client needs cross-origin access
  allow_origins: []            # e.g. ["https://app.example.com"]; ["*"] is allowed without credentials
  allow_methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
  allow_headers: [Origin, Content-Type, Accept, Authorization, X-Request-ID]
  expose_headers: [X-Request-ID]
  allow_credentials: false
  max_age: 12h

# /metrics is always mounted at /metrics — not configurable.
