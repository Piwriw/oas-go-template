apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oas-go-template.fullname" . }}-server
  labels:
    {{- include "oas-go-template.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.server.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "oas-go-template.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      annotations:
        {{- if .Values.server.existingConfigSecret.name }}
        # Roll when the selected Secret reference changes. For content-only
        # Secret updates, restart the Deployment or use a reloader controller.
        checksum/config: {{ printf "%s:%s" .Values.server.existingConfigSecret.name .Values.server.existingConfigSecret.key | sha256sum }}
        {{- else }}
        # Roll the pod whenever the chart-managed config changes.
        checksum/config: {{ include (print $.Template.BasePath "/server-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "oas-go-template.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      terminationGracePeriodSeconds: {{ .Values.server.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "oas-go-template.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "oas-go-template.image" (dict "ctx" . "image" .Values.server.image) }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          args: ["-c", "/app/config.yaml"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: config
          {{- if .Values.server.existingConfigSecret.name }}
          secret:
            secretName: {{ .Values.server.existingConfigSecret.name | quote }}
            items:
              - key: {{ required "server.existingConfigSecret.key is required when name is set" .Values.server.existingConfigSecret.key | quote }}
                path: config.yaml
          {{- else }}
          configMap:
            name: {{ include "oas-go-template.fullname" . }}-server
          {{- end }}
