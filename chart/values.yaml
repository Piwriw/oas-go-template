# Default values for oas-go-template Helm chart.
# Override per-environment via -f values.<env>.yaml or --set.

# -- Override the chart name used in resource names. Empty uses Chart.yaml .Name.
nameOverride: ""
# -- Override the fully-qualified resource names. Empty uses <release>-<chart>.
fullnameOverride: ""

# -- Image pull secret names (list); applied to both server and web pods.
imagePullSecrets: []

server:
  image:
    repository: oas-go-template
    # -- Image tag. Empty falls back to Chart.yaml .AppVersion.
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8000
  # -- Pod resources (requests/limits). Empty = K8s defaults.
  resources: {}
  # -- Existing Secret containing the complete config.yaml. When name is set,
  # server.config is ignored and the ConfigMap is not created.
  existingConfigSecret:
    name: ""
    key: config.yaml
  # -- server config.yaml content (multi-line YAML string). Mounted at /app/config.yaml
  # Keep secrets out of values; use existingConfigSecret for production credentials.
  config: |
    server:
      http_addr: ":8000"
      gin_mode: release
      read_header_timeout: 5s
      read_timeout: 15s
      write_timeout: 30s
      idle_timeout: 60s
      max_header_bytes: 1048576
      max_body_bytes: 1048576
    db:
      driver: ""
      dsn: ""
      max_open_conns: 25
      max_idle_conns: 5
      conn_max_lifetime: 30m
      log_sql: false
    log:
      format: json
      level: info
    otel:
      enabled: false
      exporter_otlp_endpoint: "http://otel-collector:4318"
      service_name: ""
      service_version: ""
    cors:
      enabled: false
      allow_origins: []
      allow_methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      allow_headers: [Origin, Content-Type, Accept, Authorization, X-Request-ID]
      expose_headers: [X-Request-ID]
      allow_credentials: false
      max_age: 12h

web:
  # -- Deploy the frontend alongside the server. Disable if you serve
  # static files from a CDN or a different release.
  enabled: true
  image:
    repository: oas-go-template-web
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  resources: {}

serviceAccount:
  # -- Create a dedicated ServiceAccount. Disable to use "default".
  create: true
  annotations: {}
  # -- Existing ServiceAccount name (only used when create=false).
  name: ""

# -- Optional pod-level annotations applied to both server and web pods.
podAnnotations: {}

# -- Pod-level security context (runAsNonRoot etc.).
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

ingress:
  # -- Enable Ingress. Off by default — enable per-environment.
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: chart-example.local
      paths:
        # Route / to the frontend, /api/ (or similar) to the backend.
        - path: /
          pathType: Prefix
          service: web
          port: 8080
        - path: /api
          pathType: Prefix
          service: server
          port: 8000
  # -- TLS entries map straight to the Ingress spec.
  tls: []
    # - secretName: chart-example-tls
    #   hosts: [chart-example.local]

autoscaling:
  # -- Enable HPA on the server Deployment. Off by default.
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Node selector applied to both server and web pods.
nodeSelector: {}

# -- Tolerations applied to both server and web pods.
tolerations: []

# -- Affinity rules applied to both server and web pods.
affinity: {}
