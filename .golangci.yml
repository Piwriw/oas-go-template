version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    # Bug-finders (high signal, low noise)
    - errcheck
    - bodyclose        # unchecked http.Response.Body.Close — common goroutine/socket leak
    - errorlint        # errors.Is vs ==, %w vs %v misuse, type-assertion safety
    - wastedassign     # writes that are never read
    - ineffassign
    - govet
    - staticcheck
    - unused

    # Style & quality
    - revive
    - gocritic
    - gocyclo          # cyclomatic complexity (see settings)
    - unconvert        # useless type conversions like `string(s)` where s is already string
    - unparam          # unused function parameters / return values
    - misspell
    - forbidigo        # forbid specific calls — here, the legacy log package
  settings:
    gocyclo:
      min-complexity: 15   # default 30; Prometheus=10, Kubernetes=20 — pick a middle ground
    forbidigo:
      # analyze-types resolves the full package path of each identifier so we
      # can write patterns like '^log\.Printf$' instead of bare ident names.
      # Without it, forbidigo matches ident-by-ident and 'log\.Printf' never
      # hits (the ident is just 'Printf' at that layer).
      analyze-types: true
      forbid:
        # Use log/slog (structured) instead of the legacy log package.
        # Anchored patterns match the full qualified selector; slog.X is a
        # different package path and is unaffected.
        - pattern: '^log\.Print(ln|f)?$'
          msg: "use log/slog for structured logging; see internal/logging"
        - pattern: '^log\.Fatal(ln|f)?$'
          msg: "use log/slog for structured logging; see internal/logging"
        - pattern: '^log\.Panic(ln|f)?$'
          msg: "use log/slog for structured logging; see internal/logging"

issues:
  exclude-rules:
    # Don't lint generated code
    - path: '.*\.gen\.go$'
      linters:
        - all
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/piwriw/oas-go-template
