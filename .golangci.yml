version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
    - misspell

issues:
  exclude-rules:
    # Don't lint generated code
    - path: '.*\.gen\.go$'
      linters:
        - all
  max-issues-per-linter: 0
  max-same-issues: 0
