openapi: 3.0.3
info:
  title: oas-go-template API
  version: 0.1.0
  description: |
    Template project API. Replace with your own spec.
servers:
  - url: http://localhost:8080
    description: local dev
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Health check
      tags:
        - system
      responses:
        '200':
          description: service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '500':
          description: service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /version:
    get:
      operationId: getVersion
      summary: Build version info
      tags:
        - system
      responses:
        '200':
          description: build metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'
components:
  schemas:
    Health:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
    VersionInfo:
      type: object
      required:
        - version
        - gitCommit
        - buildTime
      properties:
        version:
          type: string
          description: Semver (or git describe) of the build
        gitCommit:
          type: string
          description: Full git commit SHA
        buildTime:
          type: string
          description: Build timestamp in RFC3339 UTC
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
