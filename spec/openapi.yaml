openapi: 3.0.3
info:
  title: oas-go-template API
  version: 0.1.0
  description: |
    Template project API. System probes remain unversioned for Kubernetes and
    load balancers; all future business endpoints must use a /vN URL prefix.
x-api-version: v1
x-versioning:
  strategy: url-prefix
  unversioned_paths:
    - /healthz
    - /readyz
    - /version
servers:
  - url: http://localhost:8000
    description: local dev
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness probe — process is up and serving.
      tags:
        - system
      responses:
        '200':
          description: service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/ContentTooLarge'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /readyz:
    get:
      operationId: getReady
      summary: Readiness probe — dependencies (e.g. DB) are reachable.
      tags:
        - system
      responses:
        '200':
          description: service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/ContentTooLarge'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          description: service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /version:
    get:
      operationId: getVersion
      summary: Build version info
      tags:
        - system
      responses:
        '200':
          description: build metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/ContentTooLarge'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  responses:
    BadRequest:
      description: The request could not be parsed or failed contract validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: The request is not allowed by the server policy.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested route does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    MethodNotAllowed:
      description: The route exists but does not allow this HTTP method.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ContentTooLarge:
      description: The request body exceeds the configured size limit.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: The server could not complete the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Health:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
    VersionInfo:
      type: object
      required:
        - version
        - gitCommit
        - buildTime
      properties:
        version:
          type: string
          description: Semver (or git describe) of the build
        gitCommit:
          type: string
          description: Full git commit SHA
        buildTime:
          type: string
          description: Build timestamp in RFC3339 UTC
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: Numeric business error code. Range allocation — 10xxx
            validation, 20xxx auth, 30xxx not-found, 50xxx infra/db, 99xxx
            internal. See internal/errcode/errcode.go for the canonical list.
          format: int32
          minimum: 0
        message:
          type: string
