server {
    listen       8080;
    server_name  _;

    root         /usr/share/nginx/html;
    index        index.html;

    # SPA fallback: any path that isn't a real file goes to index.html
    # so client-side routing works on direct hits and refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits content-hashed filenames under /assets/* — they're
    # immutable and safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
