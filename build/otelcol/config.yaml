receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  # Forward traces to Jaeger over OTLP gRPC. Jaeger all-in-one accepts OTLP
  # on :4317 when COLLECTOR_OTLP_ENABLED=true.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Local visibility — collector logs a summary of received spans to its stdout.
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
