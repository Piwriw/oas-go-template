name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install helm
        run: |
          curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod +x /tmp/get_helm.sh && /tmp/get_helm.sh --no-sudo

      - name: Verify golangci-lint config (v2 schema)
        run: golangci-lint config verify

      - name: Codegen sync (make gen produces no diff)
        run: |
          make gen
          if ! git diff --exit-code -- internal/api/ pkg/api/; then
            echo "::error::spec/openapi.yaml and *.gen.go are out of sync. Run 'make gen' and commit the result."
            git diff --stat
            exit 1
          fi

      - name: go.mod / go.sum sync
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod or go.sum out of sync. Run 'go mod tidy' and commit."
            exit 1
          fi

      - name: Lint (golangci-lint v2)
        run: make lint

      - name: Test (race + cover)
        run: make test

      - name: Audit (govulncheck + gosec)
        run: make audit

      - name: Helm lint
        run: make helm-lint

      - name: Build server + client
        run: make build

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    # Only validate the server image builds; full integration lives elsewhere.
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile
          push: false
          load: true
          tags: oas-go-template:ci
          build-args: |
            VERSION=ci
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
