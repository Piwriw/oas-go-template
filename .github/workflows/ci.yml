name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: Sign-off Check (DCO)
    runs-on: ubuntu-latest
    # Only PRs need this — direct pushes to main have already been reviewed.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Need every commit in the PR, not just the head.

      - name: Verify each commit carries a Signed-off-by trailer
        run: |
          set -euo pipefail
          base="origin/${{ github.event.pull_request.base.ref }}"
          commits=$(git rev-list --no-merges "$base..HEAD")
          if [ -z "$commits" ]; then
            echo "No commits to check (empty PR?)."
            exit 0
          fi
          fail=0
          for sha in $commits; do
            subject=$(git log -1 --format='%h %s' "$sha")
            if ! git log -1 --format='%B' "$sha" | grep -qE '^Signed-off-by: .+ <[^[:space:]]+@[^[:space:]]+>'; then
              echo "::error::Missing Signed-off-by on $subject"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then
            echo
            echo "Every commit needs a Signed-off-by trailer (Developer Certificate of Origin)."
            echo "Fix existing commits with:"
            echo "  git rebase --signoff $base"
            echo "  git push --force-with-lease"
            echo
            echo "For new commits, use 'git commit -s' (or --signoff)."
            exit 1
          fi
          echo "All commits in this PR are signed off."

  verify:
    name: Lint, test, audit
    runs-on: ubuntu-latest
    env:
      GOLANGCI_LINT_VERSION: v2.12.2
      HELM_VERSION: v3.16.2
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: |
          make tools
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install helm
        run: |
          curl -fsSL -o /tmp/get_helm.sh "https://raw.githubusercontent.com/helm/helm/${HELM_VERSION}/scripts/get-helm-3"
          chmod +x /tmp/get_helm.sh && /tmp/get_helm.sh --version "$HELM_VERSION" --no-sudo

      - name: Verify golangci-lint config (v2 schema)
        run: golangci-lint config verify

      - name: Codegen sync (make gen produces no diff)
        run: |
          make gen
          if ! git diff --exit-code -- internal/api/ pkg/api/; then
            echo "::error::spec/openapi.yaml and *.gen.go are out of sync. Run 'make gen' and commit the result."
            git diff --stat
            exit 1
          fi

      - name: go.mod / go.sum sync
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod or go.sum out of sync. Run 'go mod tidy' and commit."
            exit 1
          fi

      - name: Lint (golangci-lint v2)
        run: make lint

      - name: Test (race + cover)
        run: make test

      - name: Security audit
        run: make audit

      - name: Helm lint
        run: make helm-lint

      - name: Build server + client
        run: make build

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    # Only validate the server image builds; full integration lives elsewhere.
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile
          push: false
          load: true
          tags: oas-go-template:ci
          build-args: |
            VERSION=ci
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
